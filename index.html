<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>RC op-amp oscillator calculator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>RC op-amp oscillator calculator</h1>
    <img src="osc.svg"/>
    <label for="fname">R</label>
    <input type="text" id="R" name="R">
    <select>
        <option value="mohm">mΩ</option>
        <option value="ohm" selected>Ω</option>
        <option value="kohm">kΩ</option>
        <option value="megohm">MΩ</option>
        <option value="gigohm">GΩ</option>
    </select><br>
    <label for="fname">C</label>
    <input type="text" id="C" name="C">
    <select>
        <option value="pf">pF</option>
        <option value="nf">nF</option>
        <option value="uf" selected>µF</option>
        <option value="mf">mF</option>
        <option value="f">F</option>
    </select><br>
    <label for="fname">R1</label>
    <input type="text" id="R1" name="R1">
    <select>
        <option value="mohm">mΩ</option>
        <option value="ohm" selected>Ω</option>
        <option value="kohm">kΩ</option>
        <option value="megohm">MΩ</option>
        <option value="gigohm">GΩ</option>
    </select><br>
    <label for="fname">R2</label>
    <input type="text" id="R2" name="R2">
    <select>
        <option value="mohm">mΩ</option>
        <option value="ohm" selected>Ω</option>
        <option value="kohm">kΩ</option>
        <option value="megohm">MΩ</option>
        <option value="gigohm">GΩ</option>
    </select><br>
    <h2>Out frequency =</h2>
  </body>
</html>
